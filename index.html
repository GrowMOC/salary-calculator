<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sindh Education Department - Salary Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-pattern"></div>

<div class="container">

    <div class="card">

        <!-- HEADER -->
        <div class="header">

            <div class="logo-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/32/Flag_of_Pakistan.svg" class="flag">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Sindh_Coat_of_Arms.svg/512px-Sindh_Coat_of_Arms.svg.png" class="govlogo">
            </div>

            <h2>Sindh Education & Literacy Department</h2>
            <div class="subtitle">Government Salary Increment Portal (BPS 01 - 22)</div>

            <div class="presented">
                Presented to you by:<br>
                <b>DEO Mr. Muhammad Ismail Buriro</b><br>
                District Jacobabad
            </div>

        </div>

        <!-- FORM -->
        <div class="form-grid">

            <div class="form-group">
                <label>Select BPS</label>
                <select id="bps"></select>
            </div>

            <div class="form-group">
                <label>Basic Pay (Current)</label>
                <input type="number" id="basicPay" placeholder="Enter Basic Pay">
            </div>

        </div>

        <button onclick="calculateSalary()">Calculate Salary</button>

        <!-- RESULT -->
        <div id="result"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
